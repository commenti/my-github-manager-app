name: Build & Verify APK

# हर branch पर push और PR पर चलेगा, साथ ही manual trigger भी उपलब्ध रहेगा
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      # ---------- STEP 1: पूरा repo + पिछला commit (diff निकालने के लिए) ----------
      - name: Checkout code (with history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ---------- STEP 2: यह push किन फाइलों को touch कर रहा है, वो दिखाओ ----------
      - name: Show changed files in this push
        run: |
          echo "### 📝 इस push में बदली/जोड़ी गई फाइलें:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "पहला commit है, diff उपलब्ध नहीं" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ---------- STEP 3: Java + Gradle सेटअप ----------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ---------- STEP 4: पहले सिर्फ compile check (तेज़, बड़ी errors जल्दी पकड़ता है) ----------
      - name: Kotlin compile check (fast)
        id: compile
        continue-on-error: true
        run: |
          ./gradlew compileDebugKotlin --stacktrace 2>&1 | tee compile-log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ---------- STEP 5: पूरा APK बनाने की कोशिश (जो भी फाइलें मौजूद हैं, उन सबको मिलाकर) ----------
      - name: Attempt full Debug APK build
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ---------- STEP 6: अगर fail हुआ, तो exact वजह निकालकर साफ़ दिखाओ ----------
      - name: Extract failure reason (missing files / unresolved references / syntax errors)
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "### ❌ Build FAIL हुआ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**संभावित वजहें (log से निकाली गई):**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E -i "unresolved reference|cannot find symbol|error:|Unresolved import|Unresolved supertype" build-log.txt | sort -u | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 पूरा log देखने के लिए नीचे 'build-logs' artifact डाउनलोड करो।" >> $GITHUB_STEP_SUMMARY

      # ---------- STEP 7: अगर सफल हुआ, तो साफ़ confirm करो ----------
      - name: Report success
        if: steps.build.outputs.exit_code == '0'
        run: |
          echo "### ✅ Build SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "मौजूदा सभी फाइलें मिलकर सही से compile हुईं और APK बन गया है।" >> $GITHUB_STEP_SUMMARY

      # ---------- STEP 8: APK सिर्फ तभी अपलोड होगा जब build सफल हो ----------
      - name: Upload APK artifact
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      # ---------- STEP 9: Logs हमेशा अपलोड होंगे (चाहे सफल हो या fail) ----------
      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            compile-log.txt
            build-log.txt
          retention-days: 14

      # ---------- STEP 10: अगर fail हुआ तो job को साफ़ तौर पर red mark करो ----------
      - name: Mark job as failed if build broke
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "Build fail हुआ — 'build-logs' artifact और ऊपर Summary देखो।"
          exit 1

